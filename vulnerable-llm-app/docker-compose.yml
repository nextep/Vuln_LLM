version: '3.8'

services:
  vulnerable-app:
    build:
      context: .
      dockerfile: Dockerfile.flask
    container_name: vulnerable-llm-app
    ports:
      - "5001:5001"
    environment:
      # Points to your OpenWebUI instance's API
      - OPENWEBUI_API_URL=http://192.168.1.110:8888/v1
      
      # --- Model Selection for Vulnerabilities ---
      # These now refer to the model TAGS you'll set up in OpenWebUI
      - OWA_MODEL_INJECTION=dolphin-phi:latest
      - OWA_MODEL_OUTPUT=codellama:latest
      - OWA_MODEL_MULTIMODAL=llava:latest
      # ... add other mappings as needed

    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    command: python app.py

volumes:
  huggingface_cache:

networks:
  default:
    name: llm-testing-network 