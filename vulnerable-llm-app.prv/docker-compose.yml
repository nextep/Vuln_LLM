version: '3.8'

services:
  vulnerable-app:
    build:
      context: .
      dockerfile: Dockerfile.flask
    container_name: vulnerable-llm-app
    ports:
      - "5001:5001"
    environment:
      # Points to your OpenWebUI instance's API
      - OPENWEBUI_API_URL=http://192.168.1.110:8888/v1
      
      # Direct Ollama connection (for internal use)
      - OLLAMA_DIRECT_URL=http://host.docker.internal:11434
      
      # Model mappings for OpenWebUI
      - OWA_MODEL_INJECTION=dolphin-phi:latest
      - OWA_MODEL_OUTPUT=codellama:latest
      - OWA_MODEL_MULTIMODAL=llava:latest
      
      # Windows-specific settings
      - FLASK_PORT=5001
      - FLASK_DEBUG=1
      
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    command: python vllm_manager.py  # Fixed entry point
    
    # Add health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: llm-testing-network 