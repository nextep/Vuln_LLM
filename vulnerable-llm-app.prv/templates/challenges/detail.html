<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Challenge Detail</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
</head>
<body class="bg-gray-50">
  <div class="max-w-3xl mx-auto py-8">
    <a class="text-blue-600" href="/challenges">← Back to Catalog</a>
    <h1 class="text-2xl font-bold mt-2">{{ test.name or test.id }}</h1>
    <p class="text-sm text-gray-600">Level: {{ test._level|default('n/a') }}</p>
    <div class="mt-4 p-4 bg-white rounded shadow">
      <form id="attempt" method="post" action="/challenges/challenge/{{ test.id }}/attempt">
        <label class="block text-sm font-medium mb-2">Your Attempt</label>
        <textarea name="payload" class="w-full border rounded p-2 h-40" required placeholder="Enter your attempt..."></textarea>
        <button class="mt-3 bg-blue-600 text-white px-4 py-2 rounded">Submit</button>
      </form>
    </div>
    <div id="feedback" class="mt-4 p-4 bg-white rounded shadow hidden"></div>
  </div>
  <script>
    document.getElementById('attempt').onsubmit = async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const r = await fetch(e.target.action, { method: 'POST', body: fd });
      const data = await r.json();
      const fb = document.getElementById('feedback');
      fb.classList.remove('hidden');
      fb.innerText = `Score: ${data.score}\nFeedback: ${data.feedback}`;
    };
  </script>
</body>
</html>
