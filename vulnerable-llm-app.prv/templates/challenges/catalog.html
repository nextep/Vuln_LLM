<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Challenges</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
</head>
<body class="bg-gray-50">
  <div class="max-w-5xl mx-auto py-8">
    <h1 class="text-2xl font-bold mb-6">Challenges Catalog</h1>
    {% for vuln in data.vulnerabilities %}
      <div class="bg-white shadow rounded p-4 mb-4">
        <h2 class="text-xl font-semibold">{{ vuln.name }} ({{ vuln.id }})</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-3">
          {% for level_name, level in vuln.levels.items() %}
            <div class="border rounded p-3">
              <div class="font-medium mb-2">Level: {{ level_name|capitalize }}</div>
              <ul class="list-disc ml-5">
                {% for t in level.tests %}
                <li><a class="text-blue-600" href="/challenges/challenge/{{ t.id }}">{{ t.name }}</a></li>
                {% endfor %}
              </ul>
            </div>
          {% endfor %}
        </div>
      </div>
    {% endfor %}
  </div>
</body>
</html>
